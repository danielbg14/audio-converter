version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - '3001:3001'
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
      - ./backend/outputs:/usr/src/app/outputs
    environment:
      - PORT=3001

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production

  # Optional Redis for BullMQ (not required for in-process worker)
  redis:
    image: redis:7
    ports:
      - '6379:6379'
